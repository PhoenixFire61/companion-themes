name: Update Theme Index

on:
  push:
    branches:
      - main
    paths:
      - "official-themes/**"
      - "community-themes/**"
      - "theme_dates.json"
      - "tools/generate_index.py"
      - ".github/workflows/update-index.yml"
  pull_request:
    branches:
      - main
    paths:
      - "official-themes/**"
      - "community-themes/**"
      - "theme_dates.json"
      - "tools/generate_index.py"
      - ".github/workflows/update-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Generate index.json and theme_dates.json
        run: python tools/generate_index.py

      - name: Show generated file changes
        run: |
          ls -la
          git status --short

      - name: Verify generated files are up to date
        if: github.event_name == 'pull_request'
        run: git diff --exit-code index.json theme_dates.json

      - name: Commit updated theme index
        if: github.event_name != 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update theme index"
          file_pattern: index.json theme_dates.json theme_dates.json
